<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#2c7da0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Log BBM">
    <meta name="description" content="Aplikasi pencatatan BBM - catat pengisian (Liter) dan pemakaian (Odometer km)">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>LOG BBM | Catat Refuel & Odometer</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Poppins', 'Roboto', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #eef2f7 0%, #dce5ed 100%);
            margin: 0;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-container {
            max-width: 1100px;
            width: 100%;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            padding: 20px 24px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.1), 0 5px 12px rgba(0,0,0,0.05);
        }

        .header {
            margin-bottom: 24px;
            border-bottom: 2px solid #2c7da0;
            padding-bottom: 8px;
        }
        h1 {
            margin: 0;
            font-size: 1.7rem;
            background: linear-gradient(135deg, #1f5e7a, #2c7da0);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        h1::before {
            content: "⛽";
            background: none;
            -webkit-background-clip: unset;
            color: #2c7da0;
        }

        .summary-ribbon {
            background: white;
            border-radius: 28px;
            padding: 16px 20px;
            margin-bottom: 24px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.04);
            border: 1px solid #cde3ed;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 10px 15px;
        }
        .summary-item {
            flex: 1;
            min-width: 130px;
            background: #f8fbfe;
            padding: 6px 12px;
            border-radius: 40px;
            text-align: center;
            box-shadow: inset 0 0 0 1px #e2edf4, 0 2px 4px rgba(0,0,0,0.02);
        }
        .summary-label {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #2c7da0;
            letter-spacing: 0.5px;
        }
        .summary-value {
            font-size: 1.4rem;
            font-weight: 800;
            color: #154f6b;
            line-height: 1.2;
        }
        .summary-unit {
            font-size: 0.7rem;
            font-weight: normal;
            color: #5e8aa4;
        }
        .total-sisa {
            background: #ffe8e8;
        }
        .total-sisa .summary-value {
            color: #d32f2f;
        }
        .warning-text {
            color: #d32f2f;
        }

        .form-card {
            background: white;
            border-radius: 32px;
            padding: 16px 20px;
            margin-bottom: 24px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border: 1px solid rgba(44,125,160,0.2);
        }
        .form-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 14px;
            color: #1f5e7a;
            border-left: 4px solid #2c7da0;
            padding-left: 12px;
        }
        .form-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: flex-end;
        }
        .input-field {
            flex: 1 1 200px;
        }
        .input-field label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #1f4e6e;
            font-size: 0.8rem;
        }
        .input-field input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 28px;
            border: 1px solid #cbdbe0;
            background: #fefefe;
            font-size: 0.95rem;
            transition: 0.2s;
            outline: none;
        }
        .input-field input:focus {
            border-color: #2c7da0;
            box-shadow: 0 0 0 3px rgba(44,125,160,0.2);
        }
        button {
            background: #2c7da0;
            border: none;
            color: white;
            font-weight: bold;
            padding: 10px 22px;
            border-radius: 40px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            min-height: 44px;
        }
        button:active {
            transform: scale(0.96);
        }
        .catat-btn {
            background: #ff8c42;
        }
        .reset-btn {
            background: #6c757d;
            padding: 12px 32px;
            font-size: 1rem;
            width: auto;
            min-width: 160px;
            display: block;
            margin: 0 auto;
        }
        .reset-btn:active {
            background: #495057;
        }
        
        .table-section {
            background: white;
            border-radius: 32px;
            padding: 16px;
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            overflow-x: auto;
        }
        .table-section h3 {
            margin-top: 0;
            margin-bottom: 12px;
            color: #154f6b;
            font-size: 1.2rem;
            font-weight: 600;
            border-left: 4px solid #2c7da0;
            padding-left: 12px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        th, td {
            padding: 10px 8px;
            text-align: center;
            border-bottom: 1px solid #e2edf4;
        }
        th {
            background: #eef3fc;
            color: #1f5e7a;
            font-weight: 700;
            font-size: 0.8rem;
        }
        .empty-row td {
            color: #8ba0b0;
            padding: 24px 10px;
            text-align: center;
        }
        .positive-change {
            color: #2e7d64;
            font-weight: 700;
        }
        .negative-change {
            color: #d32f2f;
            font-weight: 700;
        }
        .subnote {
            margin-top: 14px;
            font-size: 0.65rem;
            color: #5f7f95;
            text-align: right;
            padding-top: 6px;
        }
        .reset-bottom {
            margin-top: 30px;
            margin-bottom: 10px;
            text-align: center;
            border-top: 1px solid #e0edf5;
            padding-top: 24px;
        }
        footer {
            margin-top: 16px;
            text-align: center;
            font-size: 0.65rem;
            color: #4a6f86;
        }
        .install-banner {
            display: none;
            background: linear-gradient(135deg, #2c7da0, #1f5e7a);
            color: white;
            border-radius: 60px;
            padding: 12px 20px;
            margin-bottom: 20px;
            text-align: center;
            cursor: pointer;
            font-weight: bold;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.8; }
            50% { opacity: 1; transform: scale(1.02); }
            100% { opacity: 0.8; }
        }
        @media (max-width: 750px) {
            body { padding: 12px; }
            .app-container { padding: 16px; }
            .form-group { flex-direction: column; align-items: stretch; }
            button { width: 100%; margin-top: 5px; }
            .summary-ribbon { flex-direction: column; }
            .reset-btn { width: 100%; }
            th, td { padding: 6px 4px; font-size: 0.7rem; }
            .summary-value { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="install-banner" id="installBanner">
        📱 Install Aplikasi Log BBM → Tap di sini
    </div>

    <div class="header">
        <h1>LOG BBM</h1>
    </div>

    <!-- RINGKASAN: Total Refuel (Liter & KM), Total Penggunaan (km), Jarak Tempuh (km) -->
    <div class="summary-ribbon" id="summaryRibbon">
        <div class="summary-item">
            <div class="summary-label">TOTAL REFUEL</div>
            <div class="summary-value"><span id="totalLiterDibeli">0</span> <span class="summary-unit">L</span> / <span id="totalLiterToKm">0</span> <span class="summary-unit">KM</span></div>
        </div>
        <div class="summary-item">
            <div class="summary-label">TOTAL PENGGUNAAN</div>
            <div class="summary-value"><span id="totalKmTerpakai">0</span> <span class="summary-unit">km</span></div>
        </div>
        <div class="summary-item total-sisa">
            <div class="summary-label">⚡ JARAK TEMPUH</div>
            <div class="summary-value"><span id="totalSisaKm">0</span> <span class="summary-unit">km</span></div>
        </div>
    </div>

    <!-- FORM ODOMETER -->
    <div class="form-card">
        <div class="form-title">📊 ODOMETER</div>
        <div class="form-group">
            <div class="input-field">
                <label>🔢 Jarak Tempuh</label>
                <input type="number" id="jarakPakaiInput" step="0.1" placeholder="Contoh: 45.5" autocomplete="off">
            </div>
            <button id="tambahPakaiBtn" class="catat-btn">CATAT</button>
        </div>
    </div>

    <!-- FORM REFUEL -->
    <div class="form-card">
        <div class="form-title">⛽ REFUEL</div>
        <div class="form-group">
            <div class="input-field">
                <label>📅 Tanggal</label>
                <input type="date" id="tanggalIsiInput">
            </div>
            <div class="input-field">
                <label>➕ Liter</label>
                <input type="number" id="literIsiInput" step="0.01" placeholder="20.5">
            </div>
            <button id="tambahIsiBtn">REFUEL</button>
        </div>
    </div>

    <!-- RIWAYAT TRANSAKSI -->
    <div class="table-section">
        <h3>📋 Riwayat BBM</h3>
        <div style="overflow-x: auto;">
            <table id="logTable">
                <thead>
                    <tr><th>Tanggal</th><th>Detail</th></tr>
                </thead>
                <tbody id="tableBody">
                    <tr class="empty-row"><td colspan="2">📭 Belum ada transaksi</td></tr>
                </tbody>
             </table>
        </div>
        <div class="subnote" style="text-align: left;">💡 (+) Refuel | (-) Odometer</div>
    </div>

    <div class="reset-bottom">
        <button id="resetBtn" class="reset-btn">RESET DATA</button>
    </div>

    <footer>⚡ Data tersimpan otomatis | Catat Refuel (Liter) & Odometer (km)</footer>
</div>

<script>
    let transactions = [];     // setiap transaksi: { id, tanggal, jenis, nilai, displaySuffix }
    // jenis: "refuel" -> nilai dalam Liter, "odometer" -> nilai dalam km (jarak tempuh)
    let deferredPrompt = null;

    // Helper: total liter yang di-refuel
    function totalLiterDibeli() {
        return transactions.filter(t => t.jenis === "refuel").reduce((sum, t) => sum + t.nilai, 0);
    }
    
    // Total jarak yang sudah ditempuh (km) berdasarkan odometer
    function totalKmTerpakai() {
        let totalKm = 0;
        for (let t of transactions) {
            if (t.jenis === "odometer") {
                totalKm += t.nilai;   // t.nilai dalam km
            }
        }
        return totalKm;
    }
    
    // Sisa stok BBM dalam Kilometer (konversi dari sisa liter)
    // Sisa Liter = totalLiterDibeli - (totalKmTerpakai / 10)
    // Kemudian sisa km = sisa liter * 10
    function hitungSisaKm() {
        const totalLiterBeli = totalLiterDibeli();
        const totalKmTerpakaiVal = totalKmTerpakai();
        const totalLiterTerpakai = totalKmTerpakaiVal / 10;
        let sisaLiter = totalLiterBeli - totalLiterTerpakai;
        if (sisaLiter < 0) sisaLiter = 0;
        return sisaLiter * 10;   // konversi ke km
    }
    
    // Simpan ke localStorage
    function saveToLocalStorage() {
        localStorage.setItem('bbmLogRefuelOdometer', JSON.stringify(transactions));
    }
    
    // Load data awal / contoh
    function loadFromLocalStorage() {
        const stored = localStorage.getItem('bbmLogRefuelOdometer');
        if (stored) {
            try {
                const parsed = JSON.parse(stored);
                if (Array.isArray(parsed)) {
                    transactions = parsed.filter(t => t && typeof t.id === 'number');
                } else {
                    transactions = [];
                }
            } catch(e) { transactions = []; }
        }
        
        // Data contoh jika kosong: refuel 30L dan 20L, odometer 150km & 80km
        if (transactions.length === 0) {
            const today = new Date().toISOString().slice(0,10);
            const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0,10);
            const twoDaysAgo = new Date(Date.now() - 2*86400000).toISOString().slice(0,10);
            transactions = [
                { id: Date.now() + 1001, tanggal: twoDaysAgo, jenis: "refuel", nilai: 30.0, displaySuffix: "L" },
                { id: Date.now() + 1002, tanggal: yesterday, jenis: "refuel", nilai: 20.0, displaySuffix: "L" },
                { id: Date.now() + 1003, tanggal: today, jenis: "odometer", nilai: 150.0, displaySuffix: "km" },
                { id: Date.now() + 1004, tanggal: today, jenis: "odometer", nilai: 80.0, displaySuffix: "km" }
            ];
            saveToLocalStorage();
        }
        
        // Urutkan berdasarkan tanggal descending (terbaru di atas)
        transactions.sort((a,b) => {
            let dateA = a.tanggal ? new Date(a.tanggal) : new Date(0);
            let dateB = b.tanggal ? new Date(b.tanggal) : new Date(0);
            return dateB - dateA;
        });
        renderAll();
    }
    
    // Fungsi menambah REFUEL (Liter)
    function addRefuel(tanggal, liter) {
        if (isNaN(liter) || liter <= 0) return false;
        const literNum = parseFloat(liter);
        let tanggalFinal = tanggal && tanggal.trim() !== "" ? tanggal : new Date().toISOString().slice(0,10);
        
        const newTrans = {
            id: Date.now(),
            tanggal: tanggalFinal,
            jenis: "refuel",
            nilai: literNum,
            displaySuffix: "L"
        };
        transactions.unshift(newTrans);
        // sorting ulang
        transactions.sort((a,b) => {
            let dateA = a.tanggal ? new Date(a.tanggal) : new Date(0);
            let dateB = b.tanggal ? new Date(b.tanggal) : new Date(0);
            return dateB - dateA;
        });
        saveToLocalStorage();
        renderAll();
        return true;
    }
    
    // Fungsi ODOMETER: input dalam KM (jarak tempuh) - mengupdate TOTAL PENGGUNAAN (tidak menambah)
    function addOdometer(jarakKm) {
        if (isNaN(jarakKm) || jarakKm <= 0) return false;
        const jarak = parseFloat(jarakKm);
        const tanggalSekarang = new Date().toISOString().slice(0,10);
        
        // Hapus semua transaksi odometer yang ada sebelumnya
        transactions = transactions.filter(t => t.jenis !== "odometer");
        
        // Tambah transaksi odometer baru
        const newTrans = {
            id: Date.now(),
            tanggal: tanggalSekarang,
            jenis: "odometer",
            nilai: jarak,
            displaySuffix: "km"
        };
        transactions.unshift(newTrans);
        transactions.sort((a,b) => {
            let dateA = a.tanggal ? new Date(a.tanggal) : new Date(0);
            let dateB = b.tanggal ? new Date(b.tanggal) : new Date(0);
            return dateB - dateA;
        });
        saveToLocalStorage();
        renderAll();
        return true;
    }
    
    function resetAllTransactions() {
        if (confirm("Hapus semua data? Tindakan ini tidak bisa dibatalkan.")) {
            transactions = [];
            saveToLocalStorage();
            renderAll();
        }
    }
    
    // Render ringkasan (Total Refuel Liter & KM, Total Penggunaan km, Jarak Tempuh km) + tabel
    function renderAll() {
        const totalLiterBeli = totalLiterDibeli();
        const totalLiterToKm = totalLiterBeli * 10;
        const totalTerpakaiKm = totalKmTerpakai();
        const sisaKm = hitungSisaKm();
        
        document.getElementById('totalLiterDibeli').innerText = totalLiterBeli.toFixed(2);
        document.getElementById('totalLiterToKm').innerText = totalLiterToKm.toFixed(2);
        document.getElementById('totalKmTerpakai').innerText = totalTerpakaiKm.toFixed(2);
        document.getElementById('totalSisaKm').innerText = sisaKm.toFixed(2);
        
        const tbody = document.getElementById('tableBody');
        if (!tbody) return;
        
        if (transactions.length === 0) {
            tbody.innerHTML = `<tr class="empty-row"><td colspan="2">📭 Belum ada transaksi</td></tr>`;
            return;
        }
        
        let html = '';
        for (let t of transactions) {
            const tanggal = t.tanggal || '-';
            let detailText = '';
            let kelasWarna = '';
            
            if (t.jenis === "refuel") {
                // Refuel: tampilkan + XX Liter / XXX km
                const kmEquivalent = (t.nilai * 10).toFixed(2);
                detailText = `+ ${t.nilai.toFixed(2)} L / ${kmEquivalent} KM`;
                kelasWarna = 'positive-change';
            } else {
                // Odometer: tampilkan - XXX km / XX L
                const literEquivalent = (t.nilai / 10).toFixed(2);
                detailText = `- ${t.nilai.toFixed(2)} KM / ${literEquivalent} L`;
                kelasWarna = 'negative-change';
            }
            
            html += `<tr>
                        <td>${escapeHtml(tanggal)}</td>
                        <td class="${kelasWarna}">${escapeHtml(detailText)}</td>
                      </tr>`;
        }
        tbody.innerHTML = html;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // PWA Install Handler
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        const installBanner = document.getElementById('installBanner');
        installBanner.style.display = 'block';
        
        installBanner.addEventListener('click', () => {
            installBanner.style.display = 'none';
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('User accepted install');
                    }
                    deferredPrompt = null;
                });
            }
        });
    });
    
    window.addEventListener('appinstalled', () => {
        console.log('App installed successfully');
        document.getElementById('installBanner').style.display = 'none';
    });
    
    document.addEventListener('DOMContentLoaded', () => {
        loadFromLocalStorage();
        
        // Elemen ODOMETER (Km)
        const jarakPakaiInput = document.getElementById('jarakPakaiInput');
        const tambahPakaiBtn = document.getElementById('tambahPakaiBtn');
        
        // Elemen REFUEL (Liter)
        const tanggalIsiInput = document.getElementById('tanggalIsiInput');
        const literIsiInput = document.getElementById('literIsiInput');
        const tambahIsiBtn = document.getElementById('tambahIsiBtn');
        
        const resetBtn = document.getElementById('resetBtn');
        
        // Default tanggal refuel ke hari ini untuk kemudahan
        if (tanggalIsiInput && !tanggalIsiInput.value) {
            tanggalIsiInput.value = new Date().toISOString().slice(0,10);
        }
        
        // Event: ODOMETER (pemakaian dalam KM)
        tambahPakaiBtn.addEventListener('click', () => {
            let jarakVal = jarakPakaiInput.value;
            if (jarakVal === "") jarakVal = "0";
            const jarakNum = parseFloat(jarakVal);
            if (!isNaN(jarakNum) && jarakNum > 0) {
                addOdometer(jarakNum);
                jarakPakaiInput.value = "";
                jarakPakaiInput.focus();
            } else {
                alert("Masukkan Jarak Tempuh yang valid (> 0)");
            }
        });
        
        // Event: REFUEL (Liter)
        tambahIsiBtn.addEventListener('click', () => {
            let literIsi = literIsiInput.value;
            if (literIsi === "") literIsi = "0";
            const literNum = parseFloat(literIsi);
            let tanggal = tanggalIsiInput.value;
            if (!tanggal || tanggal.trim() === "") {
                tanggal = new Date().toISOString().slice(0,10);
            }
            if (!isNaN(literNum) && literNum > 0) {
                addRefuel(tanggal, literNum);
                literIsiInput.value = "";
                if (tanggalIsiInput) tanggalIsiInput.value = new Date().toISOString().slice(0,10);
                literIsiInput.focus();
            } else {
                alert("Masukkan jumlah liter refuel yang valid (> 0 Liter)");
            }
        });
        
        resetBtn.addEventListener('click', () => {
            resetAllTransactions();
        });
        
        // Validasi input tidak negatif
        jarakPakaiInput.addEventListener('change', function() { 
            let v = parseFloat(this.value); 
            if (isNaN(v) || v < 0) this.value = ''; 
        });
        literIsiInput.addEventListener('change', function() { 
            let v = parseFloat(this.value); 
            if (isNaN(v) || v < 0) this.value = ''; 
        });
        
        // Sinkronisasi antar tab
        window.addEventListener('storage', (e) => {
            if (e.key === 'bbmLogRefuelOdometer') {
                loadFromLocalStorage();
            }
        });
    });
</script>
</body>
</html>
